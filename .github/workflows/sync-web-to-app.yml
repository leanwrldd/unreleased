name: Sync web → app

on:
  push:
    branches: [web]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: app
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge web into app
        run: |
          git fetch origin web

          # Merge web → app without committing yet
          git merge origin/web --no-commit --no-ff || true

          # Restore app-specific files so they never get overwritten
          git checkout HEAD -- electron/ package.json vite.config.ts

          # Only push if there are actual changes
          if git diff --cached --quiet; then
            echo "Already up to date — nothing to sync."
          else
            git commit -m "chore: sync from web [skip ci]"
            git push origin app
          fi
